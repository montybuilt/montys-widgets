<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Turing Machine Simulator</title>
<!-- Absolute links to ensure GitHub Pages pulls the engines cleanly -->
<link rel="stylesheet" href="https://morphett.info/turing/turing.css" type="text/css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script src="https://morphett.info/turing/turing.js"></script>
</head>

<body>

<div id="header">
<h1>Turing Machine Simulator</h1>
</div>

<div id="turingmachine">

<div id="tapebackground">
<div id="tapecontainer">
<div id="pointer"></div>
<div id="tape"></div>
</div>
</div>

<div id="controls">
<input type="button" id="stepbtn" value="Step" title="Run one program step">
<input type="button" id="runbtn" value="Run" title="Run the program until it halts">
<input type="button" id="stopbtn" value="Pause" title="Pause the program" disabled="disabled">
<input type="button" id="resetbtn" value="Reset" title="Reset the machine to initial state">
<span id="speedcontainer">
Speed:
<input type="range" id="speedrange" min="1" max="100" value="70" title="Execution speed">
</span>
<span id="legacybuttons" style="display:none">
<input type="button" id="fwdbtn" value="&gt;">
<input type="button" id="ffbtn" value="&gt;&gt;">
</span>
</div>

<div id="inputcontainer">
Initial input: <input type="text" id="initialinput" value="1001001" title="Initial tape contents">
</div>

<div id="mainwindows">

<div id="programwindow">
<div class="windowlabel">Transition Table</div>
<!-- Injected your custom bit-flipper script right here as default -->
<textarea id="program" rows="20" cols="45" spellcheck="false" title="Enter your transition table rules here">
; This program is a bit-flipper
; Input: a string of 0's and 1's

; Machine starts in state 0.

; State 0:
0 0 1 r 1
0 1 0 r 0

; State 1
1 0 1 r 1
1 1 0 r 0
</textarea>
</div>

<div id="statewindow">
<div class="windowlabel">Machine State</div>
<div id="statetext">Current state: <span id="currentstate">0</span></div>
<div id="steptext">Steps taken: <span id="stepcount">0</span></div>
<div id="message"></div>
</div>

</div>

</div>

<div id="about">
<p>This is Anthony Morphett's Turing Machine simulator engine, configured for classroom use.</p>
</div>

</body>
</html>
